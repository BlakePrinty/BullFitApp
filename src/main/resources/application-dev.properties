# Database
spring.datasource.url=jdbc:mysql://localhost:3306/bullfit_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=bullfit_user
spring.datasource.password=bullfit_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA ? "validate" checks your schema matches entities but doesn't change anything
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info