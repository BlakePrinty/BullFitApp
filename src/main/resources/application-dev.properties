# Database
spring.datasource.url=jdbc:mysql://localhost:3306/bullfit_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=bullfit_user
spring.datasource.password=bullfit_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA ? "validate" checks your schema matches entities but doesn't change anything
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info

# jwt.secret must be a Base64-encoded string whose decoded value is
# at least 32 bytes (256 bits). The value below is safe for local dev.
#
# Generate a production secret with:  openssl rand -base64 64
#
jwt.secret=ZGV2LXNlY3JldC1rZXktZm9yLWJ1bGxmaXQtYXBwLWRldmVsb3BtZW50LW9ubHk=
jwt.expiration-ms=900000